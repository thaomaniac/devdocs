site_name: DevDocs
extra:
  generator: false
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.select
    - navigation.expand
    - navigation.path
    - navigation.footer
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - toc.follow

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      guess_lang: true
  - pymdownx.superfences
  - pymdownx.inlinehilite

nav:
  - Home: index.md
  - MySQL:
      - Overview: mysql/index.md
      - Backup:
          - mysqldump: mysql/backup/mysqldump.md
      - Admin:
          - Slow Queries & Processes: mysql/admin/performance.md
          - Drop All Tables: mysql/admin/drop-tables.md
      - Magento: mysql/magento.md
      - Reference:
          - Cheatsheet: mysql/reference/cheatsheet.md
